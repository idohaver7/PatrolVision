name: Deploy FastAPI to Hugging Face Space

on:
  push:
    branches: [ "logic_improve_branch" ] 
    paths:
      - 'Model_Server/**' 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote add hf https://idohaver7:$HF_TOKEN@huggingface.co/spaces/idohaver7/patrolvision
          git subtree push --prefix Model_Server hf main