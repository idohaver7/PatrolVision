name: Deploy FastAPI to Hugging Face Space

on:
  push:
    branches: [ "logic_improve_branch" ] 
    paths:
      - 'Model_Server/**' 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://user:$HF_TOKEN@huggingface.co/spaces/idohaver7/patrolvision
          git subtree push --prefix Model_Server hf main